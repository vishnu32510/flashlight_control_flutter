name: flashlight_control
description: "Flashlight control template with DI + theming"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  bloc: ^8.1.4
  equatable: ^2.0.7
  flutter_bloc: ^8.1.5

  # DI
  get_it: ^8.0.3

  # Routing
  go_router: ^14.6.2

  # Storage
  path_provider: ^2.1.5

  # Network / utilities
  http: ^1.2.1
  url_launcher: ^6.3.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
