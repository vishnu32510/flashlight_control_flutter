name: flashlight_control
description: "Flashlight control template with DI + theming"
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  bloc: ^8.1.4
  equatable: ^2.0.7
  flutter_bloc: ^8.1.5

  # DI
  get_it: ^8.0.3

  # Routing
  go_router: ^14.6.2

  # Storage
  path_provider: ^2.1.5

  # Network / utilities
  http: ^1.2.1
  torch_light: ^1.1.0
  url_launcher: ^6.3.2
  cupertino_icons: ^1.0.8
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/icons/app_icon.png

flutter_launcher_icons:
  # Generates Android launcher icons (including adaptive icons) + iOS App Store icon set.
  # Use the same PNG for mipmaps + adaptive foreground (required for adaptive; image_path alone is not used as foreground).
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  image_path_android: "assets/icons/app_icon.png"
  image_path_ios: "assets/icons/app_icon.png"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground_inset: 0
  background_color_ios: "#000000"
  remove_alpha_ios: true
